name: Bug report
description: Report something that is broken or regressed
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail to reproduce the issue.

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@stambha/core"
        - "@stambha/rest"
        - "@stambha/gateway"
        - "@stambha/transform"
        - "@stambha/loader"
        - "@stambha/vault"
        - "@stambha/vault-sql"
        - "@stambha/metrics"
        - Examples
        - Other / unsure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Stambha version or commit
      placeholder: e.g. 0.0.1 or abc1234
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.11.0
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack trace
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
