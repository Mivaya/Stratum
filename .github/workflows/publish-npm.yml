# Manual fallback publish — prefer the Release workflow (Changesets) on merge to main.
name: Publish npm (manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run only (no upload to npm)
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @stambha/* to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Publish (dry run)
        if: inputs.dry_run
        run: pnpm -r publish --dry-run --access public --no-git-checks --filter './packages/*'

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
