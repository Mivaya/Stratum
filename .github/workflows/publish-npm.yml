name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run only (no upload to npm)
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @stambha/* to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: pnpm -r publish --dry-run --access public --no-git-checks --filter './packages/*'

      - name: Publish to npm
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            TAG=beta
          else
            TAG=latest
          fi
          pnpm -r publish --access public --no-git-checks --tag "$TAG" --filter './packages/*'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
