<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Stambha">
  <!-- Rounded square: indigo (distinct from Discord blurple) -->
  <rect width="64" height="64" rx="14" fill="#4F46E5"/>

  <!-- Pillar capital -->
  <rect x="21" y="13" width="22" height="2.5" rx="1.25" fill="#fff"/>
  <rect x="19" y="17" width="26" height="2" rx="1" fill="#fff" opacity="0.92"/>

  <!-- Fluted shaft -->
  <rect x="24" y="21" width="3.5" height="24" rx="1" fill="#fff"/>
  <rect x="30.25" y="21" width="3.5" height="24" rx="1" fill="#fff"/>
  <rect x="36.5" y="21" width="3.5" height="24" rx="1" fill="#fff"/>

  <!-- Pillar base -->
  <path d="M22 45h20l-10 8-10-8z" fill="#fff"/>

  <!-- Circuit nodes — left -->
  <circle cx="14" cy="28" r="2.25" fill="#fff"/>
  <path d="M16.5 28H24" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="14" cy="38" r="2.25" fill="#fff"/>
  <path d="M16.5 38H24" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

  <!-- Circuit nodes — right (cyan accent) -->
  <circle cx="50" cy="28" r="2.25" fill="#fff"/>
  <path d="M40 28h8.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="38" r="2.25" fill="#2DD4BF"/>
  <path d="M40 38h8.5" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round"/>
</svg>
